profiles:
  acp-repl:
    tool:
      name: acp-repl
      main: ./cmd/acp-repl
    readme-path: ./README.md
    version:
      source: fixed
      fixed: 0.0.8
    targets:
      - os: darwin
        arch: amd64
      - os: darwin
        arch: arm64
      - os: linux
        arch: amd64
      - os: linux
        arch: arm64
      - os: windows
        arch: amd64
    build:
      ldflags: -s -w
      tags: []
      cgo: false
    distributions:
      npm:
        package: '@normahq/acp-repl'
        registry: https://registry.npmjs.org
        access: public
        publish-auth: trusted
        repository-url: git+https://github.com/normahq/acp-repl.git
        license: MIT
        include-readme: true
        keywords:
          - ai
          - llm
          - acp
          - agent
          - cli
          - repl
          - interactive
